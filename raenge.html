<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HomieCraft SMP - Ränge</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

h1 {
    margin-top: 40px;
}

.section {
    margin-top: 50px;
}

.rank {
    background: #1c1c1c;
    margin: 15px auto;
    padding: 15px;
    width: 300px;
    border-radius: 10px;
    transition: 0.3s;
}

.rank:hover {
    transform: scale(1.05);
}

/* Spieler Ränge */

.spieler { color: #aaaaaa; }
.premium { color: #ffaa00; font-weight: bold; }
.supreme { color: #0000aa; font-weight: bold; }
.vip { color: #aa00aa; font-weight: bold; }
.creator { color: #ff55ff; font-weight: bold; }

/* Staff Ränge */

.support { color: #ffff55; }
.mod { color: #ff5555; font-weight: bold; }
.dev { color: #55ffff; font-weight: bold; }
.admin { color: #aa0000; font-weight: bold; }
.owner { color: #aa0000; font-weight: bold; text-shadow: 0 0 10px red; }

</style>
</head>
<body>

<h1>🏆 HomieCraft SMP – Ränge</h1>

<div class="section">
<h2>🎮 Spieler-Ränge</h2>

<div class="rank spieler">Spieler</div>
<div class="rank premium">Premium</div>
<div class="rank supreme">Supreme</div>
<div class="rank vip">VIP</div>
<div class="rank creator">Creator</div>

</div>

<div class="section">
<h2>🛡 Server-Team</h2>

<div class="rank support">Supporter</div>
<div class="rank mod">Moderator</div>
<div class="rank dev">Developer</div>
<div class="rank admin">Administrator</div>
<div class="rank owner">OWNER</div>

</div>

</body>
</html>
