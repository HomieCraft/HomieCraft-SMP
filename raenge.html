<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>HomieCraft SMP - Ränge</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background-color: #0f0f0f; /* Dunkler Hintergrund */
    color: white; /* Grundfarbe Text */
    font-family: Arial, sans-serif;
}

/* Container für alles */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* Überschrift */
h1 {
    font-size: 3em;
    text-align: center;
    color: #ffcc00;
    text-shadow: 0 0 10px #ffcc00;
    margin-bottom: 40px;
}

/* Sektionen */
.section {
    margin-bottom: 60px;
}

/* Ränge Box */
.rank {
    background-color: #1c1c1c;
    padding: 25px;
    margin: 15px auto;
    border-radius: 12px;
    font-size: 2em;
    font-weight: bold;
    width: 90%;
    max-width: 600px;
    transition: 0.3s;
}

/* Hover Effekt */
.rank:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ffffff;
}

/* Spieler-Ränge Farben */
.spieler { color: #aaaaaa; }
.premium { color: #ffaa00; }
.supreme { color: #0000aa; }
.vip { color: #aa00aa; }
.creator { color: #ff55ff; }

/* Staff-Ränge Farben */
.support { color: #ffff55; }
.mod { color: #ff5555; }
.dev { color: #55ffff; }
.admin { color: #aa0000; }
.owner { color: #aa0000; text-shadow: 0 0 15px red; }

</style>
</head>
<body>

<div class="container">
<h1>🏆 HomieCraft SMP – Ränge</h1>

<div class="section">
<h2>🎮 Spieler-Ränge</h2>
<div class="rank spieler">Spieler</div>
<div class="rank premium">Premium</div>
<div class="rank supreme">Supreme</div>
<div class="rank vip">VIP</div>
<div class="rank creator">Creator</div>
</div>

<div class="section">
<h2>🛡 Server-Team</h2>
<div class="rank support">Supporter</div>
<div class="rank mod">Moderator</div>
<div class="rank dev">Developer</div>
<div class="rank admin">Administrator</div>
<div class="rank owner">OWNER</div>
</div>

</div>

</body>
</html>
